<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/app.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body> 
</body>
    <h1>Task manager</h1>
    <main>
        <section id="list">A</Section>
        <section id="form">
            <div class="mt-5">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" id="inputTitle"> 
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea rows="3" class="form-control"> </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Budget</label>
                <input type="number" class="form-control" id="inputbudget">
            </div>

            <div class="mb-3">
                <label class="form-label">startDate</label>
                <input type="number" class="form-control" id="inputstartDate">
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-control" id="inputStatus">
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </div>

            <div class="mb-3">
                <label class="form-label">Color</label>
                <input type="color" class="form-control" id="inputColor"></input>
            </div>
        
            <div>
                <button id="btnSave" class="btn btn-sm btn-primary btn-color">Save</button>
            </div>

            <div>
                <button id="btnDelete" class="btn btn-sm btn-primary btn-color">Delete</button>
            </div>


        </section>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

    <script src="./scripts/task.js"></script>
    <script src="./scripts/app.js"></script>


    </script>
</html>
